<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Cartel Watch — 業界カバレッジ / ヌケモレ洗い出し</title>
<link rel="stylesheet" href="theme.css" />
<style>
  /* coverage 固有 */
  :root{ --ok:var(--success); --cand:var(--warn); --gap:var(--danger); }
  .src{margin:var(--sp-3) var(--sp-6) 0;padding:10px 14px;border:1px solid rgba(91,141,239,.35);
    background:var(--brand-bg);color:#9fc7ff;border-radius:var(--r-md);font-size:var(--fs-sm)}
  .bar{height:10px;border-radius:6px;background:var(--surface-2);overflow:hidden;margin-top:var(--sp-2)}
  .bar > i{display:block;height:100%;background:linear-gradient(90deg,var(--success),#2ea043)}
  tr.gap{background:rgba(242,99,126,.07)}
  .code{display:inline-block;width:22px;height:22px;line-height:22px;text-align:center;border-radius:var(--r-sm);
    background:var(--surface-2);border:1px solid var(--line);font-weight:700;font-size:var(--fs-xs)}
  .st{font-weight:700;font-size:var(--fs-xs);padding:2px 9px;border-radius:var(--r-pill);white-space:nowrap}
  .st-ok{background:var(--success-bg);color:var(--ok);border:1px solid rgba(67,197,158,.4)}
  .st-cand{background:var(--warn-bg);color:var(--cand);border:1px solid rgba(245,167,66,.4)}
  .st-gap{background:var(--danger-bg);color:var(--gap);border:1px solid rgba(242,99,126,.4)}
  .st-na{background:var(--surface-2);color:var(--muted);border:1px solid var(--line)}
  .ex{color:var(--muted);font-size:var(--fs-xs)}
  .gapcard{border:1px solid rgba(242,99,126,.4);background:rgba(242,99,126,.06);border-radius:var(--r-md);padding:12px 14px;margin-bottom:10px}
  .gapcard h3{margin:0 0 6px;font-size:var(--fs-md);color:var(--gap)}
  b{color:var(--txt)}
</style>
</head>
<body>
<div class="src" id="src">分類正典: 読み込み中…</div>

<div class="wrap">

  <section class="panel">
    <h2>📊 カバレッジ</h2>
    <div class="kpis" id="kpis"></div>
    <div class="bar"><i id="bar" style="width:0%"></i></div>
    <div class="legend">
      <span>✅ 確定あり=公取委の摘発実績</span>
      <span>🟡 候補のみ=未摘発の疑い候補あり</span>
      <span>⛔ ヌケモレ=データ未収録（要追加）</span>
    </div>
  </section>

  <section class="panel">
    <h2>⛔ ヌケモレ業界（最優先で追加すべき領域）</h2>
    <p class="desc">下記は確定事件・候補のいずれも無い大分類。代表的な業種・サービスを追加対象として提示します。</p>
    <div id="gaps"></div>
  </section>

  <section class="panel">
    <h2>🗂 全20大分類 カバレッジ一覧（日本標準産業分類）</h2>
    <p class="desc">各大分類の確定件数・状態・代表業種・代表サービス。⛔行が抜け漏れ。</p>
    <table id="tbl">
      <thead><tr><th>分類</th><th>大分類</th><th>確定</th><th>状態</th><th>代表的な業種</th><th>代表的なサービス・商品</th></tr></thead>
      <tbody></tbody>
    </table>
  </section>

</div>

<script src="ui.js"></script>
<script src="taxonomy.js"></script>
<script src="data.js"></script>
<script src="cases-data.js"></script>
<script>
CWUI.header("coverage");
CWUI.footer("分類正典=<code>taxonomy.js</code>（総務省 日本標準産業分類）· 確定=<code>cases-data.js</code> · 候補=<code>data.js</code>");
const T=window.INDUSTRY_TAXONOMY, C=window.JFTC_CASES||[];
const $=s=>document.querySelector(s);

// 確定件数を大分類ごとに集計
const conf={};
C.forEach(c=>{(T.tagToDivision[c.industry]||["T"]).forEach(d=>conf[d]=(conf[d]||0)+1);});
// 未摘発候補がある大分類: ②の業態(div) + ①の食品系候補(E製造)
const candDiv=new Set(["E"]);
(window.CARTEL_DATA?.procurement?.categories||[]).forEach(c=>{ if(c.div) candDiv.add(c.div); });

function statusOf(code){
  if(code==="T") return {key:"na",label:"—",cls:"st-na"};
  if((conf[code]||0)>0) return {key:"ok",label:"✅ 確定あり",cls:"st-ok"};
  if(candDiv.has(code)) return {key:"cand",label:"🟡 候補のみ",cls:"st-cand"};
  return {key:"gap",label:"⛔ ヌケモレ",cls:"st-gap"};
}

const real=T.divisions.filter(d=>d.code!=="T");
const okN=real.filter(d=>statusOf(d.code).key==="ok").length;
const candN=real.filter(d=>statusOf(d.code).key==="cand").length;
const gapN=real.filter(d=>statusOf(d.code).key==="gap").length;
const coveredN=okN+candN;

function kpis(){
  const pct=Math.round(coveredN/real.length*100);
  $("#bar").style.width=pct+"%";
  const data=[
    {v:real.length,l:"全大分類(JSIC)"},
    {v:`${coveredN}/${real.length}`,l:"カバー済み"},
    {v:pct+"%",l:"カバー率"},
    {v:okN,l:"✅ 確定あり"},
    {v:gapN,l:"⛔ ヌケモレ"},
  ];
  $("#kpis").innerHTML=data.map(d=>`<div class="kpi"><div class="v">${d.v}</div><div class="l">${d.l}</div></div>`).join("");
}

function renderGaps(){
  const gaps=real.filter(d=>statusOf(d.code).key==="gap");
  $("#gaps").innerHTML=gaps.map(d=>`
    <div class="gapcard">
      <h3><span class="code">${d.code}</span> ${d.name}</h3>
      <div class="ex"><b>業種:</b> ${d.examples.map(x=>`<span class="tag">${x}</span>`).join("")}</div>
      <div class="ex" style="margin-top:4px"><b>サービス:</b> ${d.services.map(x=>`<span class="tag">${x}</span>`).join("")||"—"}</div>
    </div>`).join("") || `<div class="ex">ヌケモレはありません。</div>`;
}

function renderTable(){
  $("#tbl tbody").innerHTML=T.divisions.map(d=>{
    const s=statusOf(d.code), n=conf[d.code]||0;
    return `<tr class="${s.key==='gap'?'gap':''}">
      <td><span class="code">${d.code}</span></td>
      <td><b>${d.name}</b></td>
      <td>${n||"—"}</td>
      <td><span class="st ${s.cls}">${s.label}</span></td>
      <td class="ex">${d.examples.map(x=>`<span class="tag">${x}</span>`).join("")}</td>
      <td class="ex">${d.services.map(x=>`<span class="tag">${x}</span>`).join("")||"—"}</td>
    </tr>`;
  }).join("");
}

function init(){
  $("#src").innerHTML=`分類正典: <b>${T.source}</b> 全${real.length}大分類 ／ 確定事件 ${C.length}件をマッピング`;
  kpis(); renderGaps(); renderTable();
}
init();
</script>
</body>
</html>
